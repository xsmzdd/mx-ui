{{define "nodeOutboundModal"}}
<a-modal
        :visible="outboundModal.visible"
        :confirm-loading="outboundModal.confirmLoading"
        @ok="saveNodeOutbound"
        @cancel="closeNodeOutboundModal"
        ok-text="保存"
        cancel-text="取消"
        width="560"
        centered
        wrap-class-name="node-outbound-modal-wrap">
    <template slot="title">
        <span style="font-size: 14px; line-height: 22px; color: rgba(0, 0, 0, 0.85);">设置代理出口</span>
    </template>

    <a-form-model :model="currentNodeOutbound" layout="vertical" class="node-outbound-form">
        <a-row :gutter="12">
            <a-col :span="24">
                <a-form-model-item label="代理IP/地址" style="margin-bottom: 16px;">
                    <a-input
                            v-model="currentNodeOutbound.outboundAddress"
                            placeholder="例如：127.0.0.1 或 socks.example.com"
                            style="font-size: 14px;">
                    </a-input>
                </a-form-model-item>
            </a-col>

            <a-col :span="24">
                <a-form-model-item label="代理端口" style="margin-bottom: 16px;">
                    <a-input-number
                            v-model="currentNodeOutbound.outboundPort"
                            :min="1"
                            :max="65535"
                            style="width: 100%; font-size: 14px;">
                    </a-input-number>
                </a-form-model-item>
            </a-col>

            <a-col :span="12">
                <a-form-model-item label="用户名" style="margin-bottom: 16px;">
                    <a-input
                            v-model="currentNodeOutbound.outboundUsername"
                            placeholder="可留空"
                            style="font-size: 14px;">
                    </a-input>
                </a-form-model-item>
            </a-col>

            <a-col :span="12">
                <a-form-model-item label="密码" style="margin-bottom: 16px;">
                    <a-input-password
                            v-model="currentNodeOutbound.outboundPassword"
                            placeholder="可留空"
                            style="font-size: 14px;">
                    </a-input-password>
                </a-form-model-item>
            </a-col>
        </a-row>

        <a-alert
                message="说明"
                description="只有填写完整的 socks5 地址和端口后，当前节点出口代理才可以启用。未启用或未配置时，该节点走默认出口。"
                type="info"
                show-icon
                style="font-size: 14px; line-height: 22px;">
        </a-alert>
    </a-form-model>
</a-modal>
{{end}}
